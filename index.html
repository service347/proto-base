<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>proto-base</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.11/dist/basecoat.cdn.min.css">
  <script src="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.11/dist/js/all.min.js" defer></script>
</head>
<body class="bg-background text-foreground p-8">
  <div class="max-w-2xl mx-auto space-y-6">

    <div>
      <h1 class="text-2xl font-bold">proto-base</h1>
      <p class="text-muted-foreground mt-1">AI駆動プロトタイピング ベース層</p>
    </div>

    <div class="grid gap-3">
      <a href="prototypes/index.html" class="btn w-full justify-start">プロトタイプ一覧</a>
      <a href="templates/web/" class="btn-outline w-full justify-start">Web テンプレート</a>
      <a href="templates/mobile/" class="btn-outline w-full justify-start">モバイルテンプレート</a>
    </div>

    <!-- Basecoat 動作確認 -->
    <div class="card">
      <header>
        <h2>Basecoat 動作確認</h2>
        <p>各コンポーネントが正しく動作するか確認します</p>
      </header>
      <section class="space-y-6">

        <!-- Button -->
        <div class="space-y-2">
          <p class="text-sm font-medium text-muted-foreground">Button</p>
          <div class="flex gap-2 flex-wrap">
            <button class="btn">Default</button>
            <button class="btn-secondary">Secondary</button>
            <button class="btn-outline">Outline</button>
            <button class="btn-destructive">Destructive</button>
            <button class="btn-ghost">Ghost</button>
          </div>
        </div>

        <!-- Badge -->
        <div class="space-y-2">
          <p class="text-sm font-medium text-muted-foreground">Badge</p>
          <div class="flex gap-2 flex-wrap">
            <span class="badge">Default</span>
            <span class="badge-secondary">Secondary</span>
            <span class="badge-outline">Outline</span>
            <span class="badge-destructive">Destructive</span>
          </div>
        </div>

        <!-- Input / Field -->
        <div class="space-y-2">
          <p class="text-sm font-medium text-muted-foreground">Input / Field</p>
          <div role="group" class="field">
            <label for="sample-input">メールアドレス</label>
            <input id="sample-input" type="email" placeholder="example@example.com">
          </div>
          <div role="group" class="field">
            <label for="sample-invalid">エラー状態</label>
            <input id="sample-invalid" type="email" placeholder="example@example.com" aria-invalid="true">
          </div>
        </div>

        <!-- Dialog -->
        <div class="space-y-2">
          <p class="text-sm font-medium text-muted-foreground">Dialog</p>
          <button class="btn-outline" onclick="document.getElementById('test-dialog').showModal()">
            ダイアログを開く
          </button>
          <dialog class="dialog" id="test-dialog">
            <div>
              <header>
                <h2>確認</h2>
                <p>Basecoat の Dialog が動作しています。</p>
              </header>
              <footer>
                <button class="btn-outline" onclick="this.closest('dialog').close()">キャンセル</button>
                <button class="btn" onclick="this.closest('dialog').close()">OK</button>
              </footer>
            </div>
          </dialog>
          <script>
            document.getElementById('test-dialog').addEventListener('click', (e) => {
              if (e.target === e.currentTarget) e.currentTarget.close();
            });
          </script>
        </div>

        <!-- Tabs -->
        <div class="space-y-2">
          <p class="text-sm font-medium text-muted-foreground">Tabs</p>
          <div class="tabs">
            <nav role="tablist" aria-orientation="horizontal">
              <button role="tab" id="tab-1" aria-controls="panel-1" aria-selected="true" tabindex="0">タブ 1</button>
              <button role="tab" id="tab-2" aria-controls="panel-2" aria-selected="false" tabindex="-1">タブ 2</button>
              <button role="tab" id="tab-3" aria-controls="panel-3" aria-selected="false" tabindex="-1">タブ 3</button>
            </nav>
            <div role="tabpanel" id="panel-1" aria-labelledby="tab-1" aria-selected="true" tabindex="-1">
              <p class="p-4">タブ 1 のコンテンツ</p>
            </div>
            <div role="tabpanel" id="panel-2" aria-labelledby="tab-2" aria-selected="false" tabindex="-1" aria-hidden="true">
              <p class="p-4">タブ 2 のコンテンツ</p>
            </div>
            <div role="tabpanel" id="panel-3" aria-labelledby="tab-3" aria-selected="false" tabindex="-1" aria-hidden="true">
              <p class="p-4">タブ 3 のコンテンツ</p>
            </div>
          </div>
        </div>

      </section>
    </div>

  </div>
</body>
</html>
