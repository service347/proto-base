<!DOCTYPE html>
<html lang="ja" data-theme="corporate">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>モバイル - [サービス名]</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['"Noto Sans JP"', 'sans-serif'] } } }
    }
  </script>
  <style>body { font-family: "Noto Sans JP", sans-serif; }</style>
</head>
<body class="bg-base-300 min-h-screen flex items-center justify-center p-8">
  <div class="mockup-phone border-primary shadow-2xl">
    <div class="camera"></div>
    <div class="display">
      <div class="artboard artboard-demo phone-1 bg-base-100 flex flex-col overflow-hidden">

        <!-- ステータスバー -->
        <div class="flex items-center justify-between px-4 pt-2 pb-1 bg-base-100 shrink-0">
          <span class="text-xs font-semibold">9:41</span>
          <div class="flex items-center gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="currentColor" viewBox="0 0 24 24"><path d="M1.293 7.293a1 1 0 0 1 1.414 0C4.027 8.613 6.404 9.5 9 9.5s4.973-.887 6.293-2.207a1 1 0 1 1 1.414 1.414C14.9 10.515 12.07 11.5 9 11.5s-5.9-.985-7.707-2.793a1 1 0 0 1 0-1.414z"/><path d="M3.293 10.293a1 1 0 0 1 1.414 0C5.72 11.478 7.28 12.25 9 12.25s3.28-.772 4.293-1.957a1 1 0 1 1 1.414 1.414C13.28 13.228 11.22 14.25 9 14.25s-4.28-1.022-5.707-2.543a1 1 0 0 1 0-1.414z"/><circle cx="9" cy="16" r="1.5"/></svg>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="currentColor" viewBox="0 0 24 24"><rect x="2" y="7" width="18" height="11" rx="2" ry="2"/><path d="M22 11v3a1 1 0 0 1-1 1h-1V10h1a1 1 0 0 1 1 1z"/></svg>
          </div>
        </div>

        <!-- ナビゲーションバー -->
        <div class="flex items-center px-4 py-3 border-b border-base-200 bg-base-100 shrink-0">
          <button class="btn btn-ghost btn-sm btn-square -ml-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
          </button>
          <h1 class="flex-1 text-center font-bold text-sm">お知らせ</h1>
          <button class="btn btn-ghost btn-sm btn-square">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z" /></svg>
          </button>
        </div>

        <!-- スクロール可能コンテンツ -->
        <div class="flex-1 overflow-y-auto bg-base-200">
          <div class="space-y-2 p-3">

            <div class="card bg-base-100 shadow-sm">
              <div class="card-body p-4 gap-1">
                <div class="flex items-start justify-between gap-2">
                  <div class="flex gap-3">
                    <div class="avatar placeholder shrink-0">
                      <div class="bg-primary text-primary-content rounded-full w-10"><span class="text-sm">シ</span></div>
                    </div>
                    <div>
                      <p class="text-xs font-bold">システム通知</p>
                      <p class="text-xs text-base-content/70 mt-0.5 leading-relaxed">メンテナンスのお知らせ。5月15日 2:00〜4:00 はサービスをご利用いただけません。</p>
                    </div>
                  </div>
                  <span class="badge badge-error badge-xs shrink-0">新着</span>
                </div>
                <p class="text-xs text-base-content/40 text-right">2分前</p>
              </div>
            </div>

            <div class="card bg-base-100 shadow-sm">
              <div class="card-body p-4 gap-1">
                <div class="flex gap-3">
                  <div class="avatar placeholder shrink-0">
                    <div class="bg-secondary text-secondary-content rounded-full w-10"><span class="text-sm">田</span></div>
                  </div>
                  <div>
                    <p class="text-xs font-bold">田中 花子</p>
                    <p class="text-xs text-base-content/70 mt-0.5 leading-relaxed">レポートへのコメントが届いています。確認してください。</p>
                  </div>
                </div>
                <p class="text-xs text-base-content/40 text-right">1時間前</p>
              </div>
            </div>

            <div class="card bg-base-100 shadow-sm">
              <div class="card-body p-4 gap-1">
                <div class="flex gap-3">
                  <div class="avatar placeholder shrink-0">
                    <div class="bg-neutral text-neutral-content rounded-full w-10"><span class="text-sm">鈴</span></div>
                  </div>
                  <div>
                    <p class="text-xs font-bold">鈴木 一郎</p>
                    <p class="text-xs text-base-content/70 mt-0.5 leading-relaxed">申請が承認されました。</p>
                  </div>
                </div>
                <p class="text-xs text-base-content/40 text-right">昨日</p>
              </div>
            </div>

            <div class="card bg-base-100 shadow-sm opacity-60">
              <div class="card-body p-4 gap-1">
                <div class="flex gap-3">
                  <div class="avatar placeholder shrink-0">
                    <div class="bg-neutral text-neutral-content rounded-full w-10"><span class="text-sm">シ</span></div>
                  </div>
                  <div>
                    <p class="text-xs font-bold">システム通知</p>
                    <p class="text-xs text-base-content/70 mt-0.5 leading-relaxed">先月のレポートが公開されました。</p>
                  </div>
                </div>
                <p class="text-xs text-base-content/40 text-right">3日前</p>
              </div>
            </div>

          </div>
        </div>

        <!-- ボトムナビゲーション -->
        <div class="btm-nav btm-nav-sm border-t border-base-200 bg-base-100 shrink-0">
          <button>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
            <span class="btm-nav-label text-xs">ホーム</span>
          </button>
          <button class="active text-primary">
            <div class="indicator">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>
              <span class="indicator-item badge badge-error badge-xs">2</span>
            </div>
            <span class="btm-nav-label text-xs">通知</span>
          </button>
          <button>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
            <span class="btm-nav-label text-xs">マイページ</span>
          </button>
        </div>

      </div>
    </div>
  </div>
</body>
</html>
